<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bedtime Tracker — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #1a1a2e;
    color: #eee;
    padding: 2rem;
    max-width: 700px;
    margin: 0 auto;
  }
  h1 { font-size: 1.8rem; font-weight: 900; margin-bottom: 0.3rem; color: #ffd700; }
  p.subtitle { color: #888; margin-bottom: 2rem; font-size: 0.95rem; }
  h2 { font-size: 1.3rem; font-weight: 900; color: #ffd700; margin-bottom: 1rem; margin-top: 2rem; }
  h3 { font-size: 1.1rem; font-weight: 900; margin-bottom: 0.5rem; }

  .section {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  label { display: block; font-size: 0.85rem; color: #999; margin-bottom: 0.3rem; font-weight: 700; }

  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 0.6rem 0.8rem;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: #eee;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    outline: none;
    margin-bottom: 0.6rem;
  }
  input:focus { border-color: rgba(255,215,0,0.4); }
  input[type="number"] { width: 100px; }

  button {
    padding: 0.5rem 1.2rem;
    border-radius: 8px;
    border: none;
    background: #ffd700;
    color: #1a1a2e;
    font-family: 'Nunito', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    margin-right: 0.5rem;
  }
  button:hover { background: #ffed4a; }

  .btn-small { padding: 0.3rem 0.8rem; font-size: 0.8rem; }
  .btn-danger {
    background: rgba(255,255,255,0.1);
    color: #e57373;
    border: 1px solid rgba(229,115,115,0.3);
  }
  .btn-danger:hover { background: rgba(229,115,115,0.15); }
  .btn-secondary {
    background: rgba(255,255,255,0.1);
    color: #ccc;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.15); }

  .item-row {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.6rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .item-row:last-child { border-bottom: none; }
  .item-row .name { flex: 1; font-weight: 700; }
  .item-row .icon { font-size: 1.2rem; width: 30px; text-align: center; }

  .kid-section { margin-bottom: 0.5rem; }
  .kid-section h3.pink { color: #f8a5c2; }
  .kid-section h3.blue { color: #7ec8e3; }

  .kid-stats { color: #aaa; font-size: 0.85rem; margin-bottom: 0.8rem; }

  .image-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 0.6rem; }
  .image-preview {
    width: 70px; height: 70px; object-fit: cover;
    border-radius: 10px; border: 2px solid rgba(255,215,0,0.3);
  }
  input[type="file"] { font-family: 'Nunito', sans-serif; font-size: 0.8rem; color: #aaa; }

  .checkbox-grid { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.5rem; }
  .checkbox-grid label {
    display: inline-flex; align-items: center; gap: 0.3rem;
    font-size: 0.85rem; color: #ccc; cursor: pointer;
    background: rgba(255,255,255,0.06); padding: 0.3rem 0.6rem;
    border-radius: 6px; border: 1px solid rgba(255,255,255,0.1);
  }
  .checkbox-grid label:hover { border-color: rgba(255,215,0,0.3); }
  .checkbox-grid input[type="checkbox"] { cursor: pointer; }

  .saved-msg {
    display: inline-block; margin-left: 0.8rem;
    color: #4caf50; font-weight: 700; font-size: 0.9rem;
    opacity: 0; transition: opacity 0.3s;
  }
  .saved-msg.show { opacity: 1; }

  .back-link { display: inline-block; margin-top: 1.5rem; color: #888; font-size: 0.9rem; text-decoration: none; }
  .back-link:hover { color: #ccc; }

  .actions-bar { margin-top: 1.5rem; display: flex; gap: 0.5rem; align-items: center; }

  .star-adjust { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.3rem; }
  .star-adjust button { padding: 0.2rem 0.6rem; font-size: 0.85rem; }
</style>
</head>
<body>

<h1>Admin</h1>
<p class="subtitle">Manage kids, tasks, schedule, and rewards.</p>

<div id="app">Loading...</div>

<a href="/" class="back-link">Back to tracker</a>

<script>
let config = {};
let kidStats = {};
let pendingImages = {};
const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const KID_COLORS = ['#f8a5c2','#7ec8e3','#a5d6a7','#ffcc80','#ce93d8','#ef9a9a'];

async function load() {
  const res = await fetch('/api/config');
  const data = await res.json();
  config = data.config;
  kidStats = data.kidStats;
  render();
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  // ===== KIDS =====
  app.insertAdjacentHTML('beforeend', '<h2>Kids</h2>');

  config.kids.forEach((kid, i) => {
    const ks = kidStats[kid.id] || {};
    const color = KID_COLORS[i % KID_COLORS.length];
    const div = document.createElement('div');
    div.className = 'section kid-section';
    div.innerHTML = `
      <h3 style="color:${color}">${kid.name}</h3>
      <div class="kid-stats">${ks.totalStars || 0} total stars &middot; ${ks.starsTowardNext || 0}/${config.rewardTarget} to next reward</div>
      <div style="display:flex;gap:0.8rem;margin-bottom:0.8rem">
        <div style="flex:1"><label>Name</label><input type="text" value="${kid.name}" onchange="updateKid(${i},'name',this.value)"></div>
        <div style="width:80px"><label>Button key</label><input type="text" value="${kid.key}" maxlength="1" onchange="updateKid(${i},'key',this.value)" style="width:60px"></div>
      </div>
      <label>Working toward</label>
      <input type="text" id="wish-${kid.id}" value="${ks.wish || ''}" placeholder="e.g. Trip to the movies, new Lego set..." maxlength="200">
      <label>Reward photo</label>
      <div class="image-row">
        ${ks.wishImage ? `<img class="image-preview" id="preview-${kid.id}" src="${ks.wishImage}">` : `<img class="image-preview" id="preview-${kid.id}" style="display:none">`}
        <div>
          <input type="file" accept="image/*" onchange="previewImage('${kid.id}', this)">
          ${ks.wishImage ? `<button class="btn-small btn-danger" onclick="removeImage('${kid.id}')">Remove</button>` : ''}
        </div>
      </div>
      <button class="btn-small" onclick="saveWish('${kid.id}')">Save wish</button>
      <span class="saved-msg" id="saved-wish-${kid.id}">Saved!</span>
      <div class="star-adjust">
        <label style="display:inline;margin:0">Stars:</label>
        <button class="btn-small btn-secondary" onclick="adjustStars('${kid.id}', ${(ks.totalStars||0) - 1})">−</button>
        <span style="font-weight:700;min-width:30px;text-align:center">${ks.totalStars || 0}</span>
        <button class="btn-small btn-secondary" onclick="adjustStars('${kid.id}', ${(ks.totalStars||0) + 1})">+</button>
        <button class="btn-small btn-danger" onclick="if(confirm('Reset stars to 0?'))adjustStars('${kid.id}',0)">Reset</button>
      </div>
      <label style="margin-top:0.8rem">Tasks for ${kid.name}</label>
      <p style="color:#666;font-size:0.8rem;margin-bottom:0.4rem">Leave all unchecked to use default tasks</p>
      <div class="checkbox-grid" id="kid-tasks-${kid.id}"></div>
      <div style="margin-top:0.8rem"><button class="btn-small btn-danger" onclick="removeKid(${i})">Remove ${kid.name}</button></div>
    `;
    app.appendChild(div);

    // Populate per-kid task checkboxes
    const kidTaskGrid = document.getElementById('kid-tasks-' + kid.id);
    if (kidTaskGrid) {
      const kidTaskList = (config.kidTasks && config.kidTasks[kid.id]) || [];
      Object.keys(config.taskLibrary).forEach(taskName => {
        const checked = kidTaskList.includes(taskName);
        const safeName = taskName.replace(/'/g, "\\'");
        const lab = document.createElement('label');
        lab.innerHTML = `<input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleKidTask('${kid.id}', '${safeName}', this.checked)"> ${config.taskLibrary[taskName].icon || ''} ${taskName}`;
        kidTaskGrid.appendChild(lab);
      });
    }
  });

  const addKidBtn = document.createElement('button');
  addKidBtn.className = 'btn-secondary';
  addKidBtn.textContent = '+ Add kid';
  addKidBtn.onclick = addKid;
  app.appendChild(addKidBtn);

  // ===== TASKS =====
  app.insertAdjacentHTML('beforeend', '<h2>Tasks</h2>');
  const taskDiv = document.createElement('div');
  taskDiv.className = 'section';

  Object.keys(config.taskLibrary).forEach(taskName => {
    const task = config.taskLibrary[taskName];
    const row = document.createElement('div');
    row.className = 'item-row';
    const safeName = taskName.replace(/'/g, "\\'");
    row.innerHTML = `
      <span class="icon">${task.icon || ''}</span>
      <span class="name">${taskName}</span>
      <input type="text" style="width:50px;margin:0" value="${task.icon || ''}" placeholder="emoji" onchange="updateTaskIcon('${safeName}', this.value)">
      <button class="btn-small btn-danger" onclick="removeTask('${safeName}')">Remove</button>
    `;
    taskDiv.appendChild(row);
  });

  const addRow = document.createElement('div');
  addRow.style.cssText = 'margin-top:0.8rem;display:flex;gap:0.5rem';
  addRow.innerHTML = `
    <input type="text" id="newTaskName" placeholder="New task name" style="flex:1;margin:0">
    <input type="text" id="newTaskIcon" placeholder="emoji" style="width:60px;margin:0">
    <button onclick="addTask()">Add</button>
  `;
  taskDiv.appendChild(addRow);
  app.appendChild(taskDiv);

  // ===== DEFAULT TASKS =====
  app.insertAdjacentHTML('beforeend', '<h2>Default nightly tasks</h2>');
  const defaultDiv = document.createElement('div');
  defaultDiv.className = 'section';
  defaultDiv.innerHTML = '<p style="color:#888;font-size:0.85rem;margin-bottom:0.8rem">Which tasks appear each night by default.</p>';
  const defGrid = document.createElement('div');
  defGrid.className = 'checkbox-grid';
  Object.keys(config.taskLibrary).forEach(taskName => {
    const checked = config.defaultTasks.includes(taskName);
    const safeName = taskName.replace(/'/g, "\\'");
    const lab = document.createElement('label');
    lab.innerHTML = `<input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleDefault('${safeName}', this.checked)"> ${config.taskLibrary[taskName].icon || ''} ${taskName}`;
    defGrid.appendChild(lab);
  });
  defaultDiv.appendChild(defGrid);
  app.appendChild(defaultDiv);

  // ===== DAY OVERRIDES =====
  app.insertAdjacentHTML('beforeend', '<h2>Day-specific tasks</h2>');
  const dayDiv = document.createElement('div');
  dayDiv.className = 'section';
  dayDiv.innerHTML = '<p style="color:#888;font-size:0.85rem;margin-bottom:0.8rem">Override tasks for specific days. Unchecked days use the defaults above.</p>';

  DAYS.forEach((dayName, dayNum) => {
    const override = config.dayOverrides[dayNum];
    const hasOverride = override !== undefined && override !== null;
    const dayRow = document.createElement('div');
    dayRow.style.cssText = 'margin-bottom:1rem;padding-bottom:0.8rem;border-bottom:1px solid rgba(255,255,255,0.05)';

    const header = document.createElement('div');
    header.style.cssText = 'display:flex;align-items:center;gap:0.5rem;margin-bottom:0.4rem';
    header.innerHTML = `
      <label style="margin:0;display:inline;cursor:pointer"><input type="checkbox" ${hasOverride ? 'checked' : ''} onchange="toggleDayOverride(${dayNum}, this.checked)"> <strong style="color:#ccc">${dayName}</strong></label>
      ${hasOverride ? '' : '<span style="color:#666;font-size:0.8rem">(uses defaults)</span>'}
    `;
    dayRow.appendChild(header);

    if (hasOverride) {
      const grid = document.createElement('div');
      grid.className = 'checkbox-grid';
      Object.keys(config.taskLibrary).forEach(taskName => {
        const checked = override.includes(taskName);
        const safeName = taskName.replace(/'/g, "\\'");
        const lab = document.createElement('label');
        lab.innerHTML = `<input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleDayTask(${dayNum}, '${safeName}', this.checked)"> ${config.taskLibrary[taskName].icon || ''} ${taskName}`;
        grid.appendChild(lab);
      });
      dayRow.appendChild(grid);
    }
    dayDiv.appendChild(dayRow);
  });
  app.appendChild(dayDiv);

  // ===== SETTINGS =====
  app.insertAdjacentHTML('beforeend', '<h2>Settings</h2>');
  const settingsDiv = document.createElement('div');
  settingsDiv.className = 'section';
  settingsDiv.innerHTML = `
    <label>Stars needed for a reward</label>
    <input type="number" value="${config.rewardTarget}" min="1" max="999" onchange="config.rewardTarget=parseInt(this.value);saveConfig()">
  `;
  app.appendChild(settingsDiv);

  // ===== ACTIONS =====
  const actionsDiv = document.createElement('div');
  actionsDiv.className = 'actions-bar';
  actionsDiv.innerHTML = `
    <button onclick="resetTonight()">Reset tonight's tasks</button>
    <span class="saved-msg" id="savedMsg">Saved!</span>
  `;
  app.appendChild(actionsDiv);
}

// ===== HELPERS =====
function flash(id) {
  const el = document.getElementById(id || 'savedMsg');
  if (el) { el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 2000); }
}

// ===== KID ACTIONS =====
function updateKid(idx, field, value) {
  config.kids[idx][field] = value;
  if (field === 'name') {
    config.kids[idx].id = value.toLowerCase().replace(/[^a-z0-9]/g, '');
  }
  saveConfig();
}

function addKid() {
  const name = prompt('Kid name:');
  if (!name) return;
  const key = prompt('Button key (single letter):');
  if (!key) return;
  config.kids.push({ id: name.toLowerCase().replace(/[^a-z0-9]/g, ''), name, key: key[0] });
  saveConfig();
}

function removeKid(idx) {
  if (!confirm('Remove ' + config.kids[idx].name + '?')) return;
  config.kids.splice(idx, 1);
  saveConfig();
}

async function adjustStars(kidId, newCount) {
  if (newCount < 0) newCount = 0;
  await fetch('/api/stars/' + kidId, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ stars: newCount }),
  });
  load();
}

// ===== WISH & IMAGE =====
async function saveWish(kidId) {
  const wish = document.getElementById('wish-' + kidId).value;
  const body = { wish };
  if (pendingImages[kidId] !== undefined) {
    body.wishImage = pendingImages[kidId];
    delete pendingImages[kidId];
  }
  await fetch('/api/wish/' + kidId, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  flash('saved-wish-' + kidId);
  load();
}

function previewImage(kidId, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const max = 200;
      let w = img.width, h = img.height;
      if (w > h) { h = h * max / w; w = max; } else { w = w * max / h; h = max; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
      pendingImages[kidId] = dataUrl;
      const preview = document.getElementById('preview-' + kidId);
      preview.src = dataUrl; preview.style.display = 'block';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function removeImage(kidId) {
  const wish = document.getElementById('wish-' + kidId)?.value || '';
  await fetch('/api/wish/' + kidId, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ wish, wishImage: '' }),
  });
  load();
}

// ===== TASK ACTIONS =====
function updateTaskIcon(taskName, icon) {
  if (config.taskLibrary[taskName]) {
    config.taskLibrary[taskName].icon = icon;
    saveConfig();
  }
}

function addTask() {
  const name = document.getElementById('newTaskName').value.trim();
  const icon = document.getElementById('newTaskIcon').value.trim();
  if (!name) return;
  config.taskLibrary[name] = { icon };
  config.defaultTasks.push(name);
  saveConfig();
}

function removeTask(taskName) {
  if (!confirm('Remove "' + taskName + '"?')) return;
  delete config.taskLibrary[taskName];
  config.defaultTasks = config.defaultTasks.filter(t => t !== taskName);
  for (const day of Object.keys(config.dayOverrides)) {
    config.dayOverrides[day] = config.dayOverrides[day].filter(t => t !== taskName);
  }
  saveConfig();
}

// ===== DEFAULT & DAY TASKS =====
function toggleDefault(taskName, checked) {
  if (checked && !config.defaultTasks.includes(taskName)) {
    config.defaultTasks.push(taskName);
  } else if (!checked) {
    config.defaultTasks = config.defaultTasks.filter(t => t !== taskName);
  }
  saveConfig();
}

function toggleDayOverride(dayNum, checked) {
  if (checked) {
    config.dayOverrides[dayNum] = [...config.defaultTasks];
  } else {
    delete config.dayOverrides[dayNum];
  }
  saveConfig();
}

function toggleKidTask(kidId, taskName, checked) {
  if (!config.kidTasks) config.kidTasks = {};
  if (!config.kidTasks[kidId]) config.kidTasks[kidId] = [];
  if (checked && !config.kidTasks[kidId].includes(taskName)) {
    config.kidTasks[kidId].push(taskName);
  } else if (!checked) {
    config.kidTasks[kidId] = config.kidTasks[kidId].filter(t => t !== taskName);
  }
  // If array is empty, remove the key so it falls back to defaults
  if (config.kidTasks[kidId].length === 0) {
    delete config.kidTasks[kidId];
  }
  saveConfig();
}

function toggleDayTask(dayNum, taskName, checked) {
  if (!config.dayOverrides[dayNum]) config.dayOverrides[dayNum] = [];
  if (checked && !config.dayOverrides[dayNum].includes(taskName)) {
    config.dayOverrides[dayNum].push(taskName);
  } else if (!checked) {
    config.dayOverrides[dayNum] = config.dayOverrides[dayNum].filter(t => t !== taskName);
  }
  saveConfig();
}

// ===== SAVE =====
async function saveConfig() {
  await fetch('/api/config', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(config),
  });
  flash();
  load();
}

async function resetTonight() {
  if (!confirm("Reset tonight's task board? This regenerates from the current config.")) return;
  await fetch('/api/reset', { method: 'POST' });
  flash();
  load();
}

load();
</script>
</body>
</html>

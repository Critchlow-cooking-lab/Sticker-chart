<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Bedtime Stars</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #1a1a2e;
    color: #eee;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: 100vh;
    gap: 0;
  }

  .kid-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.4rem 0.6rem;
    position: relative;
    overflow: hidden;
  }

  .kid-panel.elodie {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-right: 2px solid rgba(255,255,255,0.05);
  }
  .kid-panel.samuel {
    background: linear-gradient(135deg, #1a1a2e 0%, #1a2332 100%);
  }

  /* Header — compact */
  .kid-name {
    font-size: 1.6rem;
    font-weight: 900;
    text-align: center;
  }

  .star-row {
    font-size: 0.75rem;
    color: #aaa;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.3rem;
    margin-top: 0.1rem;
  }

  .progress-bar {
    width: 70%;
    max-width: 260px;
    height: 8px;
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    margin: 0.3rem auto 0.4rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* ===== THE BIG CIRCLE — centre stage ===== */
  .current-task-spotlight {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }

  .big-circle {
    width: clamp(100px, 22vh, 170px);
    height: clamp(100px, 22vh, 170px);
    border-radius: 50%;
    border: 4px solid var(--kid-color, #ffd700);
    background: color-mix(in srgb, var(--kid-color, #ffd700) 12%, transparent);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 40px color-mix(in srgb, var(--kid-color, #ffd700) 40%, transparent),
                0 0 80px color-mix(in srgb, var(--kid-color, #ffd700) 15%, transparent),
                inset 0 0 30px color-mix(in srgb, var(--kid-color, #ffd700) 10%, transparent);
    animation: circleGlow 2s ease-in-out infinite;
    transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .big-circle-emoji {
    font-size: clamp(3rem, 10vh, 5.5rem);
    line-height: 1;
    filter: drop-shadow(0 0 12px rgba(255,255,255,0.3));
    animation: emojiPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
  }

  /* Gold star overlay when task is done */
  .big-circle-emoji .done-star {
    position: absolute;
    top: -0.2rem;
    right: -0.4rem;
    font-size: 2rem;
    color: #ffd700;
    filter: drop-shadow(0 0 8px rgba(255,215,0,0.8));
    animation: emojiPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes circleGlow {
    0%, 100% {
      box-shadow: 0 0 40px color-mix(in srgb, var(--kid-color, #ffd700) 40%, transparent),
                  0 0 80px color-mix(in srgb, var(--kid-color, #ffd700) 15%, transparent),
                  inset 0 0 30px color-mix(in srgb, var(--kid-color, #ffd700) 10%, transparent);
    }
    50% {
      box-shadow: 0 0 60px color-mix(in srgb, var(--kid-color, #ffd700) 55%, transparent),
                  0 0 100px color-mix(in srgb, var(--kid-color, #ffd700) 25%, transparent),
                  inset 0 0 40px color-mix(in srgb, var(--kid-color, #ffd700) 15%, transparent);
    }
  }

  @keyframes emojiPop {
    0%   { transform: scale(0.3) rotate(-15deg); opacity: 0; }
    60%  { transform: scale(1.15) rotate(3deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .current-task-name {
    font-size: 1rem;
    font-weight: 900;
    margin-top: 0.3rem;
    text-align: center;
    color: #fff;
  }

  /* All-done state for the circle */
  .big-circle.all-done-circle {
    border-color: #ffd700;
    background: rgba(255, 215, 0, 0.15);
    box-shadow: 0 0 60px rgba(255,215,0,0.5), 0 0 120px rgba(255,215,0,0.2);
  }

  .all-done-text {
    font-size: 1rem;
    font-weight: 900;
    color: #ffd700;
    margin-top: 0.5rem;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.8; }
  }

  /* ===== Task pills — small row below the circle ===== */
  .task-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.3rem;
    justify-content: center;
    padding: 0.4rem 0;
    max-width: 100%;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
    font-size: 0.65rem;
    font-weight: 700;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: #999;
    transition: all 0.3s ease;
  }

  .pill.pill-done {
    background: rgba(255, 215, 0, 0.1);
    border-color: rgba(255, 215, 0, 0.25);
    color: #b8960f;
  }

  .pill.pill-done .pill-emoji { opacity: 0.5; }
  .pill.pill-done .pill-text {
    text-decoration: line-through;
    text-decoration-color: rgba(255,215,0,0.4);
  }

  .pill.pill-current {
    background: color-mix(in srgb, var(--kid-color, #ffd700) 20%, transparent);
    border-color: var(--kid-color, #ffd700);
    color: #fff;
    font-size: 0.7rem;
  }

  .pill-star { color: #ffd700; font-size: 0.7rem; }
  .pill-emoji { font-size: 0.75rem; }

  /* Flash the completed pill gold */
  .pill.flash-gold {
    animation: pillFlash 1s ease-out;
  }
  @keyframes pillFlash {
    0%  { background: rgba(255,215,0,0.6); box-shadow: 0 0 20px rgba(255,215,0,0.5); transform: scale(1.1); }
    50% { background: rgba(255,215,0,0.2); box-shadow: 0 0 8px rgba(255,215,0,0.3); transform: scale(1); }
    100% { background: rgba(255,215,0,0.1); box-shadow: none; transform: scale(1); }
  }

  /* Wish / reward image - tiny inline */
  .wish-row {
    font-size: 0.65rem;
    color: #999;
    font-style: italic;
    text-align: center;
    margin-top: 0.1rem;
  }
  .wish-row img {
    width: 18px;
    height: 18px;
    border-radius: 4px;
    vertical-align: middle;
    margin-right: 0.2rem;
    border: 1px solid rgba(255,215,0,0.3);
  }

  /* Key hint */
  .key-hint {
    text-align: center;
    font-size: 0.6rem;
    color: #444;
    padding-top: 0.2rem;
  }
  .key-badge {
    display: inline-block;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    padding: 1px 6px;
    font-weight: 700;
    font-size: 0.6rem;
    color: #888;
  }

  /* ===== MEGA STAR CELEBRATION ===== */
  .mega-star-overlay {
    position: fixed;
    pointer-events: none;
    z-index: 1500;
    top: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .mega-star-overlay::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle, rgba(255,215,0,0.4) 0%, transparent 70%);
    animation: screenFlash 1.6s ease-out forwards;
  }
  @keyframes screenFlash {
    0% { opacity: 0; }
    10% { opacity: 1; }
    100% { opacity: 0; }
  }

  .mega-star {
    position: relative;
    z-index: 2;
    color: #ffd700;
    font-size: 22rem;
    line-height: 1;
    animation: megaStarSlam 1.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    filter: drop-shadow(0 0 80px rgba(255,215,0,0.9)) drop-shadow(0 0 160px rgba(255,180,0,0.5));
    text-shadow: 0 0 40px #ffd700, 0 0 80px #ffa500, 0 0 120px rgba(255,215,0,0.6);
  }
  @keyframes megaStarSlam {
    0%   { transform: scale(0) rotate(-30deg); opacity: 0; }
    15%  { transform: scale(1.4) rotate(8deg); opacity: 1; }
    25%  { transform: scale(0.95) rotate(-3deg); opacity: 1; }
    35%  { transform: scale(1.05) rotate(1deg); opacity: 1; }
    45%  { transform: scale(1) rotate(0deg); opacity: 1; }
    75%  { transform: scale(1) rotate(0deg); opacity: 1; }
    100% { transform: scale(1.6) rotate(20deg); opacity: 0; }
  }

  .sparkle-ring {
    position: absolute;
    z-index: 1;
    width: 10px; height: 10px;
    animation: sparkleFly var(--dur) ease-out forwards;
    animation-delay: var(--delay);
    opacity: 0;
  }
  @keyframes sparkleFly {
    0%   { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0.3); opacity: 0; }
  }

  .sparkle-ring::after {
    content: attr(data-symbol);
    font-size: var(--size);
    color: var(--color);
    filter: drop-shadow(0 0 6px var(--color));
  }

  /* Reward celebration overlay */
  .reward-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 2000;
    animation: fadeIn 0.3s ease;
  }
  .reward-overlay.visible { display: flex; }
  .reward-title {
    font-size: 4rem;
    font-weight: 900;
    color: #ffd700;
    text-align: center;
    animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .reward-subtitle {
    font-size: 1.8rem;
    color: #eee;
    margin-top: 1rem;
    text-align: center;
  }
  .reward-stars {
    font-size: 3rem;
    margin-top: 1.5rem;
    animation: spinStars 3s linear infinite;
  }
  .reward-dismiss {
    margin-top: 2rem;
    font-size: 1rem;
    color: #888;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes bounceIn {
    0% { transform: scale(0.3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes spinStars {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="container" id="app"></div>

<div class="reward-overlay" id="rewardOverlay">
  <div class="reward-stars" id="rewardStars"></div>
  <div class="reward-title" id="rewardTitle"></div>
  <div class="reward-subtitle">You earned a reward!</div>
  <div class="reward-dismiss">Press any button to close</div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let state = {};
let rewardDismissable = false;
const LONG_PRESS_MS = 1000;

// ============================================================
// WEBSOCKET
// ============================================================
function connectWS() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${protocol}//${location.host}`);
  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === 'state') {
      const oldState = state;
      state = msg.data;
      render(oldState);
    }
  };
  ws.onclose = () => setTimeout(connectWS, 2000);
}
connectWS();

// ============================================================
// KEYBOARD — short press cycles, long press marks done
// ============================================================
let keyTimers = {};

document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (document.getElementById('rewardOverlay').classList.contains('visible')) {
    if (rewardDismissable) {
      document.getElementById('rewardOverlay').classList.remove('visible');
      rewardDismissable = false;
    }
    return;
  }
  for (const kidId of Object.keys(state)) {
    if (state[kidId].key === e.key) {
      keyTimers[kidId] = {
        start: Date.now(), fired: false,
        timeout: setTimeout(() => {
          keyTimers[kidId].fired = true;
          markOrUndo(kidId);
        }, LONG_PRESS_MS),
      };
      return;
    }
  }
});

document.addEventListener('keyup', (e) => {
  for (const kidId of Object.keys(state)) {
    if (state[kidId].key === e.key && keyTimers[kidId]) {
      clearTimeout(keyTimers[kidId].timeout);
      if (!keyTimers[kidId].fired) cycleTask(kidId);
      delete keyTimers[kidId];
      return;
    }
  }
});

async function cycleTask(kidId) {
  try { await fetch(`/api/cycle/${kidId}`, { method: 'POST' }); }
  catch (err) { console.error('Cycle failed:', err); }
}

async function markOrUndo(kidId) {
  try {
    await fetch(`/api/button/${kidId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });
  } catch (err) { console.error('Button press failed:', err); }
}

// ============================================================
// RENDER
// ============================================================
function render(oldState) {
  const app = document.getElementById('app');
  app.innerHTML = '';

  for (const kidId of Object.keys(state)) {
    const kid = state[kidId];
    const oldKid = oldState?.[kidId];
    const panel = document.createElement('div');
    panel.className = `kid-panel ${kidId}`;

    const kidColor = kid.color || (kidId === 'elodie' ? '#f8a5c2' : kidId === 'samuel' ? '#7ec8e3' : '#ffd700');
    panel.style.setProperty('--kid-color', kidColor);

    const allDone = kid.tasks.every(t => t.done);
    const cursorIdx = kid.cursor !== undefined ? kid.cursor : 0;
    const currentTask = kid.tasks[cursorIdx];
    const progressPct = Math.min(100, (kid.starsTowardNext / kid.rewardTarget) * 100);

    // Detect just-completed task
    let justCompletedIdx = -1;
    if (oldKid && oldKid.tasks) {
      for (let i = 0; i < kid.tasks.length; i++) {
        if (kid.tasks[i].done && oldKid.tasks[i] && !oldKid.tasks[i].done) {
          justCompletedIdx = i;
          break;
        }
      }
    }

    // Current task emoji — show star badge if task is done
    let circleEmoji = '⭐';
    let circleLabel = '';
    let currentTaskDone = false;
    if (allDone) {
      circleEmoji = '🎉';
      circleLabel = `Great job ${kid.name}!`;
    } else if (currentTask) {
      circleEmoji = currentTask.icon || '📋';
      circleLabel = currentTask.task;
      currentTaskDone = currentTask.done;
    }

    // Task pills
    let pillsHTML = '';
    kid.tasks.forEach((t, i) => {
      const cls = [
        'pill',
        t.done ? 'pill-done' : '',
        i === cursorIdx && !allDone ? 'pill-current' : '',
        i === justCompletedIdx ? 'flash-gold' : '',
      ].filter(Boolean).join(' ');

      const icon = t.done
        ? '<span class="pill-star">★</span>'
        : (t.icon ? `<span class="pill-emoji">${t.icon}</span>` : '');
      pillsHTML += `<span class="${cls}">${icon}<span class="pill-text">${t.task}</span></span>`;
    });

    // Wish row
    let wishHTML = '';
    if (kid.wish || kid.wishImage) {
      wishHTML = `<div class="wish-row">${kid.wishImage ? `<img src="${kid.wishImage}" alt="">` : ''}${kid.wish || ''}</div>`;
    }

    panel.innerHTML = `
      <div class="kid-name" style="color:${kidColor}">${kid.name}</div>
      <div class="star-row">
        <span style="color:#ffd700">★</span> ${kid.starsTowardNext} / ${kid.rewardTarget}
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="background:linear-gradient(90deg, ${kidColor}, ${kidColor}dd); width:${progressPct}%"></div>
      </div>
      ${wishHTML}
      <div class="current-task-spotlight">
        <div class="big-circle ${allDone ? 'all-done-circle' : ''}">
          <div class="big-circle-emoji">${circleEmoji}${currentTaskDone ? '<span class="done-star">⭐</span>' : ''}</div>
        </div>
        <div class="${allDone ? 'all-done-text' : 'current-task-name'}">${circleLabel}</div>
      </div>
      <div class="task-pills">${pillsHTML}</div>
      <div class="key-hint">
        <span class="key-badge">${kid.key}</span> press = cycle &middot; hold = done
      </div>
    `;

    app.appendChild(panel);

    // Mega star animation
    if (justCompletedIdx >= 0) {
      const panelEl = app.querySelector(`.kid-panel.${kidId}`);
      if (panelEl) createMegaStar(panelEl);
    }

    // Reward check
    if (oldKid && kid.rewardCount > (oldKid.rewardCount || 0)) {
      showReward(kid.name);
    }
  }
}

// ============================================================
// MEGA STAR ANIMATION
// ============================================================
function createMegaStar(panelEl) {
  const panelRect = panelEl.getBoundingClientRect();
  const overlay = document.createElement('div');
  overlay.className = 'mega-star-overlay';
  overlay.style.left = panelRect.left + 'px';
  overlay.style.width = panelRect.width + 'px';

  const star = document.createElement('div');
  star.className = 'mega-star';
  star.textContent = '★';
  overlay.appendChild(star);

  const colors = ['#ffd700', '#ffed4a', '#fff', '#ffa500', '#ffe066', '#ffcc00'];
  const symbols = ['★', '✦', '✧', '⭐', '✨', '⭑', '✸'];
  for (let i = 0; i < 24; i++) {
    const angle = (i / 24) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
    const dist = 180 + Math.random() * 200;
    const p = document.createElement('div');
    p.className = 'sparkle-ring';
    p.setAttribute('data-symbol', symbols[Math.floor(Math.random() * symbols.length)]);
    p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
    p.style.setProperty('--color', colors[Math.floor(Math.random() * colors.length)]);
    p.style.setProperty('--size', (1.5 + Math.random() * 2) + 'rem');
    p.style.setProperty('--dur', (0.8 + Math.random() * 0.6) + 's');
    p.style.setProperty('--delay', (Math.random() * 0.25) + 's');
    p.style.left = '50%';
    p.style.top = '50%';
    overlay.appendChild(p);
  }

  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 2200);
}

// ============================================================
// AUTO-REFRESH AT MIDNIGHT
// ============================================================
let currentDate = new Date().toDateString();
setInterval(() => {
  const now = new Date().toDateString();
  if (now !== currentDate) { currentDate = now; location.reload(); }
}, 2 * 60 * 60 * 1000);

// ============================================================
// REWARD CELEBRATION
// ============================================================
function showReward(name) {
  const overlay = document.getElementById('rewardOverlay');
  document.getElementById('rewardTitle').textContent = `${name} earned a reward!`;
  document.getElementById('rewardStars').textContent = '✳️ ⭐ ✳️';
  overlay.classList.add('visible');
  rewardDismissable = false;
  setTimeout(() => { rewardDismissable = true; }, 1500);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>

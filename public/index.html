<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Bedtime Stars</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #1a1a2e;
    color: #eee;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: 100vh;
    gap: 0;
  }

  .kid-panel {
    display: flex;
    flex-direction: column;
    padding: 2.5rem 2rem;
    position: relative;
    overflow: hidden;
  }

  .kid-panel.elodie {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-right: 2px solid rgba(255,255,255,0.05);
  }
  .kid-panel.samuel {
    background: linear-gradient(135deg, #1a1a2e 0%, #1a2332 100%);
  }

  /* Header */
  .kid-header {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .kid-name {
    font-size: 2.8rem;
    font-weight: 900;
    margin-bottom: 0.3rem;
  }
  .elodie .kid-name { color: #f8a5c2; }
  .samuel .kid-name { color: #7ec8e3; }

  .task-emoji {
    font-size: 1.1rem;
  }

  .wish-image-wrap {
    text-align: center;
    margin-bottom: 0.5rem;
  }
  .wish-image {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 12px;
    border: 2px solid rgba(255,215,0,0.3);
  }

  .kid-wish {
    font-size: 1rem;
    color: #ccc;
    margin-bottom: 0.4rem;
    font-weight: 700;
    font-style: italic;
  }

  .star-summary {
    font-size: 1.1rem;
    color: #aaa;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  /* Star progress bar */
  .progress-bar {
    width: 80%;
    max-width: 320px;
    height: 18px;
    background: rgba(255,255,255,0.08);
    border-radius: 9px;
    margin: 0.8rem auto 1.5rem;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    border-radius: 9px;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .elodie .progress-fill { background: linear-gradient(90deg, #f8a5c2, #e056a0); }
  .samuel .progress-fill { background: linear-gradient(90deg, #7ec8e3, #3d9fd1); }
  .progress-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 0.7rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }

  /* Task list */
  .task-list {
    list-style: none;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .task-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.2rem;
    background: rgba(255,255,255,0.04);
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.06);
    font-size: 1.3rem;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .task-item.done {
    background: rgba(255, 215, 0, 0.08);
    border-color: rgba(255, 215, 0, 0.2);
  }

  .task-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
    transition: all 0.4s ease;
  }

  .task-item.done .task-icon {
    border-color: #ffd700;
    background: rgba(255, 215, 0, 0.2);
  }

  .task-text {
    font-weight: 700;
    transition: all 0.3s ease;
  }
  .task-item.done .task-text {
    color: #999;
    text-decoration: line-through;
    text-decoration-color: rgba(255,215,0,0.4);
  }

  /* Current task highlight */
  .task-item.current {
    border-color: rgba(255,215,0,0.4);
    background: rgba(255,215,0,0.06);
  }
  .elodie .task-item.current { border-color: rgba(248,165,194,0.4); background: rgba(248,165,194,0.06); }
  .samuel .task-item.current { border-color: rgba(126,200,227,0.4); background: rgba(126,200,227,0.06); }

  /* Key hint */
  .key-hint {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.95rem;
    color: #666;
  }
  .key-badge {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    padding: 2px 10px;
    font-weight: 700;
    font-size: 0.9rem;
    color: #ccc;
  }

  /* All-done message */
  .all-done {
    display: none;
    text-align: center;
    padding: 2rem;
    font-size: 1.6rem;
    font-weight: 900;
    color: #ffd700;
    animation: pulse 2s ease-in-out infinite;
  }
  .all-done.visible { display: block; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.8; }
  }

  /* Star burst animation */
  .star-burst {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
  }
  .star-particle {
    position: absolute;
    font-size: 1.8rem;
    animation: starFly 1s ease-out forwards;
  }
  @keyframes starFly {
    0% { transform: translate(0, 0) scale(1) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0) rotate(360deg); opacity: 0; }
  }

  /* Reward celebration overlay */
  .reward-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 2000;
    animation: fadeIn 0.3s ease;
  }
  .reward-overlay.visible { display: flex; }
  .reward-title {
    font-size: 4rem;
    font-weight: 900;
    color: #ffd700;
    text-align: center;
    animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .reward-subtitle {
    font-size: 1.8rem;
    color: #eee;
    margin-top: 1rem;
    text-align: center;
  }
  .reward-stars {
    font-size: 3rem;
    margin-top: 1.5rem;
    animation: spinStars 3s linear infinite;
  }
  .reward-dismiss {
    margin-top: 2rem;
    font-size: 1rem;
    color: #888;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes bounceIn {
    0% { transform: scale(0.3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes spinStars {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="container" id="app">
  <!-- Panels rendered by JS -->
</div>

<div class="reward-overlay" id="rewardOverlay">
  <div class="reward-stars" id="rewardStars"></div>
  <div class="reward-title" id="rewardTitle"></div>
  <div class="reward-subtitle">You earned a reward!</div>
  <div class="reward-dismiss">Press any button to close</div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let state = {};
let previousStars = {};
let rewardDismissable = false;
const LONG_PRESS_MS = 1000;

// ============================================================
// WEBSOCKET CONNECTION
// ============================================================
function connectWS() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${protocol}//${location.host}`);

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === 'state') {
      const oldState = state;
      state = msg.data;
      render(oldState);
    }
  };

  ws.onclose = () => {
    setTimeout(connectWS, 2000);
  };
}
connectWS();


// ============================================================
// KEYBOARD INPUT — short press cycles, long press marks done
// ============================================================
let keyTimers = {};

document.addEventListener('keydown', (e) => {
  if (e.repeat) return;

  // Dismiss reward overlay
  if (document.getElementById('rewardOverlay').classList.contains('visible')) {
    if (rewardDismissable) {
      document.getElementById('rewardOverlay').classList.remove('visible');
      rewardDismissable = false;
    }
    return;
  }

  for (const kidId of Object.keys(state)) {
    if (state[kidId].key === e.key) {
      keyTimers[kidId] = {
        start: Date.now(),
        fired: false,
        timeout: setTimeout(() => {
          keyTimers[kidId].fired = true;
          // Long press — mark done or undo (server handles both)
          markOrUndo(kidId);
        }, LONG_PRESS_MS),
      };
      return;
    }
  }
});

document.addEventListener('keyup', (e) => {
  for (const kidId of Object.keys(state)) {
    if (state[kidId].key === e.key && keyTimers[kidId]) {
      clearTimeout(keyTimers[kidId].timeout);
      if (!keyTimers[kidId].fired) {
        // Short press — cycle to next task via server
        cycleTask(kidId);
      }
      delete keyTimers[kidId];
      return;
    }
  }
});

async function cycleTask(kidId) {
  try {
    await fetch(`/api/cycle/${kidId}`, { method: 'POST' });
  } catch (err) {
    console.error('Cycle failed:', err);
  }
}

async function markOrUndo(kidId) {
  try {
    const cursorIdx = state[kidId]?.cursor;
    const res = await fetch(`/api/button/${kidId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });
    const data = await res.json();
    if (data.success && !data.undone) {
      // Star burst animation on the task that was just completed
      const panel = document.querySelector(`.kid-panel.${kidId}`);
      const items = panel?.querySelectorAll('.task-item');
      if (items && items[cursorIdx]) {
        createStarBurst(items[cursorIdx]);
      }
    }
  } catch (err) {
    console.error('Button press failed:', err);
  }
}

// ============================================================
// RENDER
// ============================================================
function render(oldState) {
  const app = document.getElementById('app');
  app.innerHTML = '';

  for (const kidId of Object.keys(state)) {
    const kid = state[kidId];
    const oldKid = oldState?.[kidId];
    const panel = document.createElement('div');
    panel.className = `kid-panel ${kidId}`;

    const allDone = kid.tasks.every(t => t.done);
    const cursorIdx = kid.cursor !== undefined ? kid.cursor : 0;
    const progressPct = Math.min(100, (kid.starsTowardNext / kid.rewardTarget) * 100);

    let tasksHTML = '';
    kid.tasks.forEach((t, i) => {
      const classes = [
        'task-item',
        t.done ? 'done' : '',
        (i === cursorIdx) ? 'current' : '',
      ].filter(Boolean).join(' ');

      const icon = t.done
        ? '<span style="color:#ffd700">&#9733;</span>'
        : (t.icon ? `<span class="task-emoji">${t.icon}</span>` : '');
      tasksHTML += `
        <li class="${classes}">
          <div class="task-icon">${icon}</div>
          <span class="task-text">${t.task}</span>
        </li>`;
    });

    panel.innerHTML = `
      <div class="kid-header">
        <div class="kid-name">${kid.name}</div>
        ${kid.wishImage ? `<div class="wish-image-wrap"><img class="wish-image" src="${kid.wishImage}" alt="${kid.wish || 'Reward'}"></div>` : ''}
        ${kid.wish ? `<div class="kid-wish">Working toward: ${kid.wish}</div>` : ''}
        <div class="star-summary">
          <span style="color:#ffd700">&#9733;</span>
          ${kid.starsTowardNext} / ${kid.rewardTarget} stars to next reward
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: ${progressPct}%"></div>
          <div class="progress-label">${kid.starsTowardNext} / ${kid.rewardTarget}</div>
        </div>
      </div>
      <ul class="task-list">${tasksHTML}</ul>
      <div class="all-done ${allDone ? 'visible' : ''}">
        &#9733; All done tonight! Great job ${kid.name}! &#9733;
      </div>
      <div class="key-hint">
        <span class="key-badge">${kid.key}</span> press to cycle &middot; hold to mark done &middot; hold again to undo
      </div>
    `;

    app.appendChild(panel);

    // Check for reward
    if (oldKid && kid.rewardCount > (oldKid.rewardCount || 0)) {
      showReward(kid.name);
    }
  }
}

// ============================================================
// STAR BURST ANIMATION
// ============================================================
function createStarBurst(element) {
  const rect = element.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  const container = document.createElement('div');
  container.className = 'star-burst';
  container.style.left = cx + 'px';
  container.style.top = cy + 'px';

  const particles = 8;
  for (let i = 0; i < particles; i++) {
    const angle = (i / particles) * Math.PI * 2;
    const distance = 60 + Math.random() * 40;
    const tx = Math.cos(angle) * distance;
    const ty = Math.sin(angle) * distance;

    const star = document.createElement('div');
    star.className = 'star-particle';
    star.innerHTML = '&#9733;';
    star.style.color = '#ffd700';
    star.style.setProperty('--tx', tx + 'px');
    star.style.setProperty('--ty', ty + 'px');
    container.appendChild(star);
  }

  document.body.appendChild(container);
  setTimeout(() => container.remove(), 1200);
}

// ============================================================
// AUTO-REFRESH AT MIDNIGHT
// ============================================================
let currentDate = new Date().toDateString();
setInterval(() => {
  const now = new Date().toDateString();
  if (now !== currentDate) {
    currentDate = now;
    location.reload();
  }
}, 2 * 60 * 60 * 1000);

// ============================================================
// REWARD CELEBRATION
// ============================================================
function showReward(name) {
  const overlay = document.getElementById('rewardOverlay');
  document.getElementById('rewardTitle').textContent = `${name} earned a reward!`;
  document.getElementById('rewardStars').textContent = '✳️ ⭐ ✳️';

  overlay.classList.add('visible');
  rewardDismissable = false;

  // Prevent accidental instant dismiss
  setTimeout(() => { rewardDismissable = true; }, 1500);
}

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>

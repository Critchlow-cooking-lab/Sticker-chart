<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Bedtime Stars</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #1a1a2e;
    color: #eee;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }

  .container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    height: 100vh;
    gap: 0;
  }

  .kid-panel {
    display: flex;
    flex-direction: column;
    padding: 2.5rem 2rem;
    position: relative;
    overflow: hidden;
  }

  .kid-panel.elodie {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    border-right: 2px solid rgba(255,255,255,0.05);
  }
  .kid-panel.samuel {
    background: linear-gradient(135deg, #1a1a2e 0%, #1a2332 100%);
  }

  /* Header */
  .kid-header {
    text-align: center;
    margin-bottom: 1.5rem;
  }
  .kid-name {
    font-size: 2.8rem;
    font-weight: 900;
    margin-bottom: 0.3rem;
  }
  /* Kid name colors set dynamically via inline style */

  .task-emoji {
    font-size: 1.1rem;
  }

  .wish-image-wrap {
    text-align: center;
    margin-bottom: 0.5rem;
  }
  .wish-image {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 12px;
    border: 2px solid rgba(255,215,0,0.3);
  }

  .kid-wish {
    font-size: 1rem;
    color: #ccc;
    margin-bottom: 0.4rem;
    font-weight: 700;
    font-style: italic;
  }

  .star-summary {
    font-size: 1.1rem;
    color: #aaa;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
  }

  /* Star progress bar */
  .progress-bar {
    width: 80%;
    max-width: 320px;
    height: 18px;
    background: rgba(255,255,255,0.08);
    border-radius: 9px;
    margin: 0.8rem auto 1.5rem;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    border-radius: 9px;
    transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  /* Progress bar color set via inline style using kid color */
  .progress-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 0.7rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }

  /* Task list */
  .task-list {
    list-style: none;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .task-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.2rem;
    background: rgba(255,255,255,0.04);
    border-radius: 14px;
    border: 1px solid rgba(255,255,255,0.06);
    font-size: 1.3rem;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
  }

  .task-item.done {
    background: rgba(255, 215, 0, 0.08);
    border-color: rgba(255, 215, 0, 0.2);
  }

  .task-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
    transition: all 0.4s ease;
  }

  .task-item.done .task-icon {
    border-color: #ffd700;
    background: rgba(255, 215, 0, 0.2);
  }

  .task-text {
    font-weight: 700;
    transition: all 0.3s ease;
  }
  .task-item.done .task-text {
    color: #999;
    text-decoration: line-through;
    text-decoration-color: rgba(255,215,0,0.4);
  }

  /* Current task highlight — uses --kid-color custom property */
  .task-item.current {
    border-color: var(--kid-color, rgba(255,215,0,0.8));
    border-width: 3px;
    background: color-mix(in srgb, var(--kid-color, #ffd700) 15%, transparent);
    box-shadow: 0 0 24px color-mix(in srgb, var(--kid-color, #ffd700) 50%, transparent),
                inset 0 0 20px color-mix(in srgb, var(--kid-color, #ffd700) 8%, transparent);
    animation: glowPulse 1.8s ease-in-out infinite;
  }

  @keyframes glowPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.8; box-shadow: 0 0 40px color-mix(in srgb, var(--kid-color, #ffd700) 60%, transparent),
                                     inset 0 0 30px color-mix(in srgb, var(--kid-color, #ffd700) 12%, transparent); }
  }

  /* Key hint */
  .key-hint {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.95rem;
    color: #666;
  }
  .key-badge {
    display: inline-block;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    padding: 2px 10px;
    font-weight: 700;
    font-size: 0.9rem;
    color: #ccc;
  }

  /* All-done message */
  .all-done {
    display: none;
    text-align: center;
    padding: 2rem;
    font-size: 1.6rem;
    font-weight: 900;
    color: #ffd700;
    animation: pulse 2s ease-in-out infinite;
  }
  .all-done.visible { display: block; }

  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.8; }
  }

  /* ===== MEGA STAR CELEBRATION ===== */
  .mega-star-overlay {
    position: fixed;
    pointer-events: none;
    z-index: 1500;
    top: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Screen flash */
  .mega-star-overlay::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(circle, rgba(255,215,0,0.4) 0%, transparent 70%);
    animation: screenFlash 1.6s ease-out forwards;
  }
  @keyframes screenFlash {
    0% { opacity: 0; }
    10% { opacity: 1; }
    100% { opacity: 0; }
  }

  /* The big star itself */
  .mega-star {
    position: relative;
    z-index: 2;
    color: #ffd700;
    font-size: 22rem;
    line-height: 1;
    animation: megaStarSlam 1.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    filter: drop-shadow(0 0 80px rgba(255,215,0,0.9)) drop-shadow(0 0 160px rgba(255,180,0,0.5));
    text-shadow: 0 0 40px #ffd700, 0 0 80px #ffa500, 0 0 120px rgba(255,215,0,0.6);
  }
  @keyframes megaStarSlam {
    0%   { transform: scale(0) rotate(-30deg); opacity: 0; }
    15%  { transform: scale(1.4) rotate(8deg); opacity: 1; }
    25%  { transform: scale(0.95) rotate(-3deg); opacity: 1; }
    35%  { transform: scale(1.05) rotate(1deg); opacity: 1; }
    45%  { transform: scale(1) rotate(0deg); opacity: 1; }
    75%  { transform: scale(1) rotate(0deg); opacity: 1; }
    100% { transform: scale(1.6) rotate(20deg); opacity: 0; }
  }

  /* Sparkle ring that bursts outward */
  .sparkle-ring {
    position: absolute;
    z-index: 1;
    width: 10px; height: 10px;
    animation: sparkleFly var(--dur) ease-out forwards;
    animation-delay: var(--delay);
    opacity: 0;
  }
  @keyframes sparkleFly {
    0%   { transform: translate(0, 0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0.3); opacity: 0; }
  }

  .sparkle-ring::after {
    content: attr(data-symbol);
    font-size: var(--size);
    color: var(--color);
    filter: drop-shadow(0 0 6px var(--color));
  }

  /* Flash the completed task row gold */
  .task-item.flash-gold {
    animation: taskFlash 1s ease-out;
  }
  @keyframes taskFlash {
    0%  { background: rgba(255,215,0,0.6); box-shadow: 0 0 40px rgba(255,215,0,0.6); transform: scale(1.03); }
    50% { background: rgba(255,215,0,0.2); box-shadow: 0 0 15px rgba(255,215,0,0.3); transform: scale(1); }
    100% { background: rgba(255,215,0,0.08); box-shadow: none; transform: scale(1); }
  }

  /* Reward celebration overlay */
  .reward-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 2000;
    animation: fadeIn 0.3s ease;
  }
  .reward-overlay.visible { display: flex; }
  .reward-title {
    font-size: 4rem;
    font-weight: 900;
    color: #ffd700;
    text-align: center;
    animation: bounceIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .reward-subtitle {
    font-size: 1.8rem;
    color: #eee;
    margin-top: 1rem;
    text-align: center;
  }
  .reward-stars {
    font-size: 3rem;
    margin-top: 1.5rem;
    animation: spinStars 3s linear infinite;
  }
  .reward-dismiss {
    margin-top: 2rem;
    font-size: 1rem;
    color: #888;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes bounceIn {
    0% { transform: scale(0.3); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  @keyframes spinStars {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="container" id="app">
  <!-- Panels rendered by JS -->
</div>

<div class="reward-overlay" id="rewardOverlay">
  <div class="reward-stars" id="rewardStars"></div>
  <div class="reward-title" id="rewardTitle"></div>
  <div class="reward-subtitle">You earned a reward!</div>
  <div class="reward-dismiss">Press any button to close</div>
</div>

<script>
// ============================================================
// STATE
// ============================================================
let state = {};
let previousStars = {};
let rewardDismissable = false;
const LONG_PRESS_MS = 1000;

// ============================================================
// WEBSOCKET CONNECTION
// ============================================================
function connectWS() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(`${protocol}//${location.host}`);

  ws.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type === 'state') {
      const oldState = state;
      state = msg.data;
      render(oldState);
    }
  };

  ws.onclose = () => {
    setTimeout(connectWS, 2000);
  };
}
connectWS();


// ============================================================
// KEYBOARD INPUT — short press cycles, long press marks done
// ============================================================
let keyTimers = {};

document.addEventListener('keydown', (e) => {
  if (e.repeat) return;

  // Dismiss reward overlay
  if (document.getElementById('rewardOverlay').classList.contains('visible')) {
    if (rewardDismissable) {
      document.getElementById('rewardOverlay').classList.remove('visible');
      rewardDismissable = false;
    }
    return;
  }

  for (const kidId of Object.keys(state)) {
    if (state[kidId].key === e.key) {
      keyTimers[kidId] = {
        start: Date.now(),
        fired: false,
        timeout: setTimeout(() => {
          keyTimers[kidId].fired = true;
          // Long press — mark done or undo (server handles both)
          markOrUndo(kidId);
        }, LONG_PRESS_MS),
      };
      return;
    }
  }
});

document.addEventListener('keyup', (e) => {
  for (const kidId of Object.keys(state)) {
    if (state[kidId].key === e.key && keyTimers[kidId]) {
      clearTimeout(keyTimers[kidId].timeout);
      if (!keyTimers[kidId].fired) {
        // Short press — cycle to next task via server
        cycleTask(kidId);
      }
      delete keyTimers[kidId];
      return;
    }
  }
});

async function cycleTask(kidId) {
  try {
    await fetch(`/api/cycle/${kidId}`, { method: 'POST' });
  } catch (err) {
    console.error('Cycle failed:', err);
  }
}

async function markOrUndo(kidId) {
  try {
    await fetch(`/api/button/${kidId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({}),
    });
    // Animation is triggered in render() by comparing old vs new state
  } catch (err) {
    console.error('Button press failed:', err);
  }
}

// ============================================================
// RENDER
// ============================================================
function render(oldState) {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const kidIds = Object.keys(state);
  for (const kidId of kidIds) {
    const kid = state[kidId];
    const oldKid = oldState?.[kidId];
    const panel = document.createElement('div');
    panel.className = `kid-panel ${kidId}`;

    // Use kid color from config, or default
    const kidColor = kid.color || (kidId === 'elodie' ? '#f8a5c2' : kidId === 'samuel' ? '#7ec8e3' : '#ffd700');
    panel.style.setProperty('--kid-color', kidColor);

    const allDone = kid.tasks.every(t => t.done);
    const cursorIdx = kid.cursor !== undefined ? kid.cursor : 0;
    const progressPct = Math.min(100, (kid.starsTowardNext / kid.rewardTarget) * 100);

    // Detect which task just got completed (for animation)
    let justCompletedIdx = -1;
    if (oldKid && oldKid.tasks) {
      for (let i = 0; i < kid.tasks.length; i++) {
        if (kid.tasks[i].done && oldKid.tasks[i] && !oldKid.tasks[i].done) {
          justCompletedIdx = i;
          break;
        }
      }
    }

    let tasksHTML = '';
    kid.tasks.forEach((t, i) => {
      const classes = [
        'task-item',
        t.done ? 'done' : '',
        (i === cursorIdx) ? 'current' : '',
        (i === justCompletedIdx) ? 'flash-gold' : '',
      ].filter(Boolean).join(' ');

      const icon = t.done
        ? '<span style="color:#ffd700">&#9733;</span>'
        : (t.icon ? `<span class="task-emoji">${t.icon}</span>` : '');
      tasksHTML += `
        <li class="${classes}">
          <div class="task-icon">${icon}</div>
          <span class="task-text">${t.task}</span>
        </li>`;
    });

    panel.innerHTML = `
      <div class="kid-header">
        <div class="kid-name" style="color:${kidColor}">${kid.name}</div>
        ${kid.wishImage ? `<div class="wish-image-wrap"><img class="wish-image" src="${kid.wishImage}" alt="${kid.wish || 'Reward'}"></div>` : ''}
        ${kid.wish ? `<div class="kid-wish">Working toward: ${kid.wish}</div>` : ''}
        <div class="star-summary">
          <span style="color:#ffd700">&#9733;</span>
          ${kid.starsTowardNext} / ${kid.rewardTarget} stars to next reward
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="background:linear-gradient(90deg, ${kidColor}, ${kidColor}dd); width: ${progressPct}%"></div>
          <div class="progress-label">${kid.starsTowardNext} / ${kid.rewardTarget}</div>
        </div>
      </div>
      <ul class="task-list">${tasksHTML}</ul>
      <div class="all-done ${allDone ? 'visible' : ''}">
        &#9733; All done tonight! Great job ${kid.name}! &#9733;
      </div>
      <div class="key-hint">
        <span class="key-badge">${kid.key}</span> press to cycle &middot; hold to mark done &middot; hold again to undo
      </div>
    `;

    app.appendChild(panel);

    // Fire mega star animation if a task was just completed
    if (justCompletedIdx >= 0) {
      const panelEl = app.querySelector(`.kid-panel.${kidId}`);
      if (panelEl) createMegaStar(panelEl);
    }

    // Check for reward
    if (oldKid && kid.rewardCount > (oldKid.rewardCount || 0)) {
      showReward(kid.name);
    }
  }
}

// ============================================================
// MEGA STAR ANIMATION
// ============================================================
function createMegaStar(panelEl) {
  const panelRect = panelEl.getBoundingClientRect();

  const overlay = document.createElement('div');
  overlay.className = 'mega-star-overlay';
  overlay.style.left = panelRect.left + 'px';
  overlay.style.width = panelRect.width + 'px';

  // The big star
  const star = document.createElement('div');
  star.className = 'mega-star';
  star.textContent = '★';
  overlay.appendChild(star);

  // Sparkle ring — 24 particles flying outward
  const colors = ['#ffd700', '#ffed4a', '#fff', '#ffa500', '#ffe066', '#ffcc00'];
  const symbols = ['★', '✦', '✧', '⭐', '✨', '⭑', '✸'];
  for (let i = 0; i < 24; i++) {
    const angle = (i / 24) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
    const dist = 180 + Math.random() * 200;
    const tx = Math.cos(angle) * dist;
    const ty = Math.sin(angle) * dist;

    const p = document.createElement('div');
    p.className = 'sparkle-ring';
    p.setAttribute('data-symbol', symbols[Math.floor(Math.random() * symbols.length)]);
    const c = colors[Math.floor(Math.random() * colors.length)];
    p.style.setProperty('--tx', tx + 'px');
    p.style.setProperty('--ty', ty + 'px');
    p.style.setProperty('--color', c);
    p.style.setProperty('--size', (1.5 + Math.random() * 2) + 'rem');
    p.style.setProperty('--dur', (0.8 + Math.random() * 0.6) + 's');
    p.style.setProperty('--delay', (Math.random() * 0.25) + 's');
    p.style.left = '50%';
    p.style.top = '50%';
    overlay.appendChild(p);
  }

  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 2200);
}

// ============================================================
// AUTO-REFRESH AT MIDNIGHT
// ============================================================
let currentDate = new Date().toDateString();
setInterval(() => {
  const now = new Date().toDateString();
  if (now !== currentDate) {
    currentDate = now;
    location.reload();
  }
}, 2 * 60 * 60 * 1000);

// ============================================================
// REWARD CELEBRATION
// ============================================================
function showReward(name) {
  const overlay = document.getElementById('rewardOverlay');
  document.getElementById('rewardTitle').textContent = `${name} earned a reward!`;
  document.getElementById('rewardStars').textContent = '✳️ ⭐ ✳️';

  overlay.classList.add('visible');
  rewardDismissable = false;

  // Prevent accidental instant dismiss
  setTimeout(() => { rewardDismissable = true; }, 1500);
}

// Register service worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
